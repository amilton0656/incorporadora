{% extends 'base_intranet.html' %}
{% block title %}Sem empresa vinculada{% endblock %}

{% block inner_content %}
<div class="max-w-md mx-auto text-center py-16">
  <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
    <svg class="w-8 h-8 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    </svg>
  </div>
  <h1 class="text-xl font-semibold text-gray-800 mb-2">Nenhuma empresa vinculada</h1>
  <p class="text-gray-400 text-sm mb-6">
    Seu usuário ainda não foi associado a nenhuma empresa.<br>
    Entre em contato com o administrador do sistema.
  </p>
  <a href="{% url 'logout' %}"
     class="inline-block text-sm font-medium text-gray-500 hover:text-gray-700 border border-gray-300 px-5 py-2 rounded-lg hover:bg-gray-50 transition">
    Sair
  </a>
</div>
{% endblock %}
