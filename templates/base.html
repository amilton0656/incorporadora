<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Intranet{% endblock %} — Incorporadora</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#1B3A6B', light: '#2E5FA3', dark: '#122952' }
          }
        }
      }
    }
  </script>
  <style>
    /* Tom Select — fundo sólido e z-index alto para não vazar elementos do DOM abaixo */
    .ts-dropdown { background: #fff !important; z-index: 9999 !important; }
    .ts-dropdown .option { background: #fff; }
    .ts-dropdown .option:hover, .ts-dropdown .option.active { background: #EEF2FF; }
  </style>
</head>
<body class="bg-gray-200 text-gray-800 min-h-screen">
  {% block content %}{% endblock %}
</body>
</html>
